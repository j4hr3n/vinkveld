<!doctype html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍷</text></svg>"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <title>Vinkveld</title>
    %sveltekit.head%
    <script>
      // Redirect old hash-based routes to path-based routes
      (function () {
        var hash = window.location.hash;
        if (hash && hash.startsWith("#/")) {
          var path = hash.slice(1); // e.g. "/abc123"
          window.location.replace("/vinkveld" + path);
        }
      })();
    </script>
  </head>
  <body>
    %sveltekit.body%
  </body>
</html>
